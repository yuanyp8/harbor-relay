name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build installer
        run: |
          chmod +x ./build.sh
          ./build.sh --arch ${{ matrix.arch }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: harbor-relay-${{ matrix.arch }}
          path: |
            dist/linux-${{ matrix.arch }}/harbor-relay-toolkit-linux-${{ matrix.arch }}.run
            dist/linux-${{ matrix.arch }}/harbor-relay-toolkit-linux-${{ matrix.arch }}.run.sha256

  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci

      - name: Build documentation site
        run: npm run build

      - name: Pack documentation site
        run: tar -czf ../harbor-relay-docs-site.tar.gz -C build .

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: harbor-relay-docs-site
          path: harbor-relay-docs-site.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-run
      - build-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.*
