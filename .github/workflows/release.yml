name: release

on:
  # 支持在 GitHub Actions 页面手工触发。
  # 适合以下场景：
  # 1. 只想重新打一遍 .run 包
  # 2. 想验证最新 main 分支是否还能正常构建
  # 3. 不希望依赖本地开发机来产出安装包
  workflow_dispatch:
  push:
    # 推送到 main 时，自动构建可下载的 .run 安装包和文档产物。
    # 这些产物会出现在当前 workflow 的 Artifacts 页面中，方便服务器直接下载。
    branches:
      - main
    # 推送语义化版本标签时，除了生成 artifacts，还会自动发布 GitHub Release。
    tags:
      - "v*"

jobs:
  build-run:
    # 构建 Harbor Relay 的双架构自解压安装包。
    # 这里产出的 .run 是后续生产环境最推荐使用的交付物。
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 准备 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 执行 Go 单元测试
        run: go test ./...

      - name: 构建 ${{ matrix.arch }} 安装包
        run: |
          chmod +x ./build.sh
          ./build.sh --arch ${{ matrix.arch }}

      - name: 上传 ${{ matrix.arch }} 安装包产物
        uses: actions/upload-artifact@v4
        with:
          name: harbor-relay-${{ matrix.arch }}
          retention-days: 14
          path: |
            dist/linux-${{ matrix.arch }}/harbor-relay-toolkit-linux-${{ matrix.arch }}.run
            dist/linux-${{ matrix.arch }}/harbor-relay-toolkit-linux-${{ matrix.arch }}.run.sha256

  build-docs:
    # 构建文档站点的静态文件，并打成 tar.gz 供后续部署使用。
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: 安装文档站依赖
        run: npm ci

      - name: 构建文档站静态文件
        run: npm run build

      - name: 打包文档站静态文件
        run: tar -czf ../harbor-relay-docs-site.tar.gz -C build .

      - name: 上传文档站产物
        uses: actions/upload-artifact@v4
        with:
          name: harbor-relay-docs-site
          retention-days: 14
          path: harbor-relay-docs-site.tar.gz

  publish-release:
    # 只有在打 tag 时才会创建 GitHub Release。
    # main 分支日常构建只保留 artifacts，不会污染正式版本发布页。
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-run
      - build-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.*
