name: docs-image

on:
  # 支持在 GitHub 页面手工点一下直接构建。
  workflow_dispatch:

  # 当 main 分支更新，或者打了 v* 标签时，自动构建 docs 镜像。
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  # 拉源码只需要只读权限。
  contents: read

  # 推送到 GitHub Container Registry（GHCR）需要 packages: write。
  packages: write

env:
  # GitHub Packages / GHCR 中的镜像名。
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/harbor-relay-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取当前仓库源码。
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 准备跨架构构建支持，后面要同时构建 amd64 / arm64。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 启用 Docker Buildx，支持多平台镜像构建与远程缓存。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录 GHCR。
      #    这里使用 GitHub 自带的 GITHUB_TOKEN 即可，不需要额外准备密码。
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 如果你在仓库里配置了 Docker Hub 信息，就额外登录 Docker Hub。
      #
      #    需要在 GitHub 仓库中提前配置：
      #    - Repository Variables:
      #      - DOCKERHUB_IMAGE，例如：yuanyp8/harbor-relay-docs
      #    - Repository Secrets:
      #      - DOCKERHUB_USERNAME
      #      - DOCKERHUB_TOKEN
      #
      #    如果没有配置 DOCKERHUB_IMAGE，这一步会自动跳过，不影响 GHCR 推送。
      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_IMAGE != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. 如果你在仓库里配置了阿里云 ACR 信息，就额外登录 ACR。
      #
      #    建议在 GitHub 仓库中配置：
      #    - Repository Variables:
      #      - ACR_REGISTRY，例如：registry.cn-hangzhou.aliyuncs.com
      #      - ACR_IMAGE，例如：registry.cn-hangzhou.aliyuncs.com/your-namespace/harbor-relay-docs
      #    - Repository Secrets:
      #      - ACR_USERNAME
      #      - ACR_PASSWORD
      #
      #    说明：
      #    - ACR_USERNAME / ACR_PASSWORD 建议使用容器镜像服务的专用登录凭据
      #    - 如果没有配置 ACR_IMAGE，这一步会自动跳过
      - name: Log in to Alibaba Cloud ACR
        if: ${{ vars.ACR_IMAGE != '' && vars.ACR_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 7. 组装最终要发布到哪些镜像仓库。
      #    默认一定会发到 GHCR；
      #    如果配置了 vars.DOCKERHUB_IMAGE，则会一起发到 Docker Hub。
      #    如果配置了 vars.ACR_IMAGE，则会一起发到阿里云 ACR。
      - name: Prepare image list
        id: images
        shell: bash
        run: |
          {
            echo 'images<<EOF'
            echo "${GHCR_IMAGE}"
            if [[ -n "${{ vars.DOCKERHUB_IMAGE }}" ]]; then
              echo "docker.io/${{ vars.DOCKERHUB_IMAGE }}"
            fi
            if [[ -n "${{ vars.ACR_IMAGE }}" ]]; then
              echo "${{ vars.ACR_IMAGE }}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # 8. 统一生成 tags 和 OCI labels。
      #    例如：
      #    - main 分支 -> main / latest / sha-xxxx
      #    - tag 发布  -> v1.0.0 / sha-xxxx
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      # 9. 一次 build，同时推送到所有已登录仓库。
      #    这是整个 workflow 的核心步骤：
      #    - 构建 docs 静态站点镜像
      #    - 输出 linux/amd64 与 linux/arm64
      #    - 推送到 GHCR
      #    - 如已配置 Docker Hub，则同步推送到 Docker Hub
      #    - 如已配置阿里云 ACR，则同步推送到阿里云 ACR
      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: website/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
